[tool:pytest]
# pytest configuration file

# test directory
testpaths = tests

# minimum version requirement
minversion = 6.0

# add options
addopts =
    --strict-markers
    --strict-config
    --disable-warnings
    --tb=short
    -ra

# marker definitions
markers =
    unit: unit tests
    integration: integration tests
    i18n: i18n tests
    web: Web UI tests
    mcp: MCP-related tests
    slow: slow tests
    asyncio: async tests

# test discovery pattern
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# async test support
asyncio_mode = auto

# timeout (seconds)
timeout = 60

# filter warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
